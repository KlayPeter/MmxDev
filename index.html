<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MMX.dev | AI Application Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #3b82f6;
            --secondary-glow: #a855f7;
            --accent-glow: #10b981;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fcfdff; 
            overflow-x: hidden;
            color: #1e293b;
        }

        /* 高级流体极光背景 */
        .bg-canvas {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: #fcfdff;
            overflow: hidden;
        }
        
        /* 胶片噪点图层 - 增加质感 */
        .noise-overlay {
            position: absolute;
            inset: 0;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        /* 动态彩色光斑 */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.12;
            mix-blend-mode: multiply;
            animation: orbMove 40s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        .orb-1 { width: 60vw; height: 60vw; background: #60a5fa; top: -20%; left: -10%; }
        .orb-2 { width: 50vw; height: 50vw; background: #c084fc; bottom: -10%; right: -10%; animation-delay: -10s; }
        .orb-3 { width: 40vw; height: 40vw; background: #fb7185; top: 30%; left: 40%; animation-delay: -20s; }
        .orb-4 { width: 45vw; height: 45vw; background: #34d399; bottom: 20%; left: -5%; animation-delay: -30s; }

        @keyframes orbMove {
            0% { transform: translate(0, 0) scale(1) rotate(0deg); }
            33% { transform: translate(5%, 10%) scale(1.1) rotate(10deg); }
            66% { transform: translate(-5%, 5%) scale(0.9) rotate(-10deg); }
            100% { transform: translate(0, 0) scale(1) rotate(0deg); }
        }

        /* 全局卡片玻璃效果增强 */
        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.04);
        }

        /* 页面切换动画：更丝滑的位移和缩放 */
        .page-enter {
            animation: pageReveal 0.8s cubic-bezier(0.2, 1, 0.3, 1) forwards;
        }

        @keyframes pageReveal {
            from { 
                opacity: 0; 
                transform: translateY(30px) scale(0.98); 
                filter: blur(8px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
                filter: blur(0);
            }
        }

        /* 渐变色文字 */
        .text-gradient-vibrant {
            background: linear-gradient(135deg, #1d4ed8 0%, #7c3aed 50%, #be185d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: gradientMove 6s linear infinite;
        }

        @keyframes gradientMove {
            to { background-position: 200% center; }
        }

        /* 按钮光晕效果 */
        .glow-button {
            position: relative;
            transition: all 0.3s ease;
        }
        .glow-button:hover {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div class="bg-canvas">
        <div class="noise-overlay"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
